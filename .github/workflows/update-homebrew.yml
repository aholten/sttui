name: Update Homebrew Formula

on:
  workflow_run:
    workflows: ["Publish to PyPI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-formula:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: aholten/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}
          path: tap

      - name: Checkout stttui (for pyproject.toml)
        uses: actions/checkout@v4
        with:
          path: src

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        # homebrew-pypi-poet imports pkg_resources, which setuptools removed
        # as a top-level module in 82.0. Pin to the last version that ships it.
        run: pip install "setuptools<81" homebrew-pypi-poet

      - name: Resolve version and wait for PyPI availability
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('src/pyproject.toml','rb'))['project']['version'])")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          for i in {1..30}; do
            if pip install "stttui==$VERSION" --dry-run 2>/dev/null; then
              echo "Package available on PyPI"
              break
            fi
            echo "Waiting for PyPI... attempt $i"
            sleep 10
          done

      - name: Generate resource stanzas
        run: |
          pip install "stttui==$VERSION"
          poet stttui > resources.txt
          cat resources.txt

      - name: Update formula
        run: |
          python - <<'SCRIPT'
          import re, hashlib, urllib.request, os

          version = os.environ["VERSION"]

          url = f"https://files.pythonhosted.org/packages/source/s/stttui/stttui-{version}.tar.gz"
          sha256 = hashlib.sha256(urllib.request.urlopen(url).read()).hexdigest()

          with open("resources.txt") as f:
              resources_raw = f.read()

          # Drop the stttui self-resource — it's the main package, not a dep.
          resources = re.sub(
              r'  resource "stttui" do\n.*?\n.*?\n  end\n\n?',
              '',
              resources_raw,
              flags=re.DOTALL,
          )

          formula_path = "tap/Formula/stttui.rb"
          with open(formula_path) as f:
              formula = f.read()

          formula = re.sub(r'url ".*?"', f'url "{url}"', formula)
          formula = re.sub(r'sha256 "[a-f0-9]+"', f'sha256 "{sha256}"', formula, count=1)
          formula = re.sub(
              r'(# --- auto-generated resources ---\n).*?(  # --- end resources ---)',
              r'\1' + resources + r'  \2',
              formula,
              flags=re.DOTALL,
          )

          with open(formula_path, "w") as f:
              f.write(formula)
          SCRIPT

      - name: Commit and push updated formula
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/stttui.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "stttui: update to $VERSION"
          git push
